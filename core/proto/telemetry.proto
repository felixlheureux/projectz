syntax = "proto3";

// The package name prevents naming conflicts
package projectz.telemetry.v1;

// This defines the Go package path for the generated code
option go_package = "projectz/core/telemetry/v1";

// The main envelope sent by the Rust Edge Agent
message TelemetryBatch {
  // A unique, static identifier for the remote sensor/device
  string device_id = 1;
  
  // Unix timestamp (seconds since epoch) of when the batch was created
  int64 timestamp = 2;

  // A collection of individual data points collected during this interval
  repeated Metric metrics = 3;
}

// A single hardware or sensor metric
message Metric {
  // We use an enum for the metric type to save massive amounts of bandwidth.
  // Sending an integer (0, 1, 2) is infinitely faster than sending the string "CPU_USAGE".
  enum MetricType {
    UNKNOWN = 0;
    CPU_USAGE_PERCENT = 1;
    MEMORY_USAGE_BYTES = 2;
    CPU_TEMPERATURE_CELSIUS = 3;
    NETWORK_TX_BYTES = 4;
    NETWORK_RX_BYTES = 5;
  }

  MetricType type = 1;
  
  // The actual reading (using double for precision across different sensor types)
  double value = 2;
}

// The response sent back by the Go Ingester to acknowledge receipt
message IngestResponse {
  bool success = 1;
  string error_message = 2; // Empty if success is true
}