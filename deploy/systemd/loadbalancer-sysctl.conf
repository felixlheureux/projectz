# projectz load balancer — host kernel tuning
# Apply with: sysctl -p /etc/sysctl.d/99-projectz-lb.conf
# Or copy this file to /etc/sysctl.d/99-projectz-lb.conf and reboot.
#
# Reference: specs.md section 6

# System-wide open file descriptor ceiling.
# 100k connections × 6 fds = 600k minimum. 1M gives headroom.
fs.file-max = 1000000

# Maximum backlog of fully-established connections waiting for accept().
net.core.somaxconn = 65535

# SYN backlog — prevents drops during traffic spikes before accept() drains.
net.ipv4.tcp_max_syn_backlog = 65535

# Ephemeral port range for outbound connections (LB → ingestion pods).
# Default 32768–60999 gives ~28k ports; expanding to full range avoids exhaustion
# when maintaining large connection pools.
net.ipv4.ip_local_port_range = 1024 65535

# 2MB hugepages for io_uring buffer rings (IORING_SETUP_BUF_RING).
# 1024 × 2MB = 2GB reserved. Adjust to available RAM.
# Eliminates TLB misses on every packet buffer access.
vm.nr_hugepages = 1024

# Keep TCP sockets in TIME_WAIT for shorter — we use SO_LINGER(0)/RST
# so this mainly affects any non-RST closes.
net.ipv4.tcp_fin_timeout = 15

# Increase the local socket send/receive buffer maximums.
net.core.rmem_max = 134217728
net.core.wmem_max = 134217728
