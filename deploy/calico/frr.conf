# FRRouting (FRR) config for the bare metal LB node.
# FRR accepts the BGP session from Calico and installs pod CIDR routes
# into the kernel routing table, making pod IPs directly reachable.
#
# Install FRR: apt install frr
# Enable BGP:  sed -i 's/bgpd=no/bgpd=yes/' /etc/frr/daemons && systemctl restart frr
# Config path: /etc/frr/frr.conf

frr version 9.0
frr defaults traditional
hostname lb-node
log syslog informational

router bgp 64512
  bgp router-id LB_NODE_IP
  no bgp ebgp-requires-policy

  # Peer with each k8s node running Calico.
  # Add one neighbor line per k8s node IP.
  neighbor K8S_NODE_IP remote-as 64512
  neighbor K8S_NODE_IP description calico-node

  address-family ipv4 unicast
    # Accept pod CIDR routes announced by Calico.
    neighbor K8S_NODE_IP activate
    neighbor K8S_NODE_IP soft-reconfiguration inbound
  exit-address-family

line vty
