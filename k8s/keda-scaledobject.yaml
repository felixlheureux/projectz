apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ingestion-scaler
spec:
  scaleTargetRef:
    name: ingestion
  minReplicaCount: 1
  maxReplicaCount: 20
  cooldownPeriod: 30       # seconds to wait before scaling down
  pollingInterval: 5       # how often KEDA scrapes the metrics endpoint

  triggers:
    - type: metrics-api
      metadata:
        # KEDA scrapes the JSON endpoint — Prometheus text format is not supported
        # by metrics-api trigger. /metrics/json returns plain JSON.
        url: "http://loadbalancer:9090/metrics/json"
        valueLocation: "lb_queue_depth"
        targetValue: "10"  # scale up when queue_depth > 10 per replica
