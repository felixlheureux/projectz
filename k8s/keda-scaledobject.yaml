apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ingestion-scaler
spec:
  scaleTargetRef:
    name: ingestion
  minReplicaCount: 1
  maxReplicaCount: 20
  cooldownPeriod: 30       # seconds to wait before scaling down
  pollingInterval: 5       # how often KEDA scrapes the metrics endpoint

  triggers:
    - type: metrics-api
      metadata:
        # Scale on active connections: 1 ingestion pod per 300 active connections.
        # KEDA computes: desired = ceil(lb_active_connections / 300)
        # queue_depth only goes non-zero when already overwhelmed — too late.
        url: "http://loadbalancer:9090/metrics/json"
        valueLocation: "lb_active_connections"
        targetValue: "300"
